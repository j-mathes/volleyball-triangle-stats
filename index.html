<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triangle Stats</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <!-- ===== Nav bar ===== -->
    <nav class="page-nav">
      <span class="nav-title">Triangle Stats</span>
      <button id="navStats" class="nav-btn active" data-page="stats">Stats</button>
      <button id="navHistory" class="nav-btn" data-page="history">History</button>
      <button id="navConfig" class="nav-btn" data-page="config">Setup</button>
    </nav>

    <!-- ===== Configuration Page ===== -->
    <div id="configPage" class="config-page">
      <div class="config-card">
        <h2>Match Setup</h2>
        <label for="cfgMatchName">Match Name</label>
        <input id="cfgMatchName" value="Practice Match" placeholder="Match name">

        <fieldset class="format-picker">
          <legend>Match Format</legend>
          <label><input type="radio" name="matchFormat" value="bestOf" checked> Best Of <span class="format-hint">(odd number of sets)</span></label>
          <label><input type="radio" name="matchFormat" value="straightSets"> Straight Sets <span class="format-hint">(even number of sets)</span></label>
        </fieldset>

        <label for="cfgTotalSets">Number of Sets</label>
        <div class="stepper">
          <button id="btnSetsDown" type="button" class="stepper-btn">&minus;</button>
          <span id="cfgTotalSets" class="stepper-value">5</span>
          <button id="btnSetsUp" type="button" class="stepper-btn">+</button>
        </div>

        <button id="btnBeginMatch" class="begin-match-btn">Start Match</button>
      </div>
    </div>

    <!-- ===== Stats Page ===== -->
    <div id="statsPage" class="stats-page">

    <div class="control-panel">
      <span id="matchNameDisplay" class="match-name-display"></span>
      <span id="setIndicator" class="set-indicator">Set 1 of 5</span>
      <button id="btnEndSet" disabled>End Set</button>
      <button id="btnEndMatch" disabled>End Match</button>
      <button id="btnUndo" disabled>Undo</button>
      <button id="btnRedo" disabled>Redo</button>
    </div>

    <div class="content-area">
      <article class="vertex top">
        <h2>Terminal Serves</h2>
        <div class="value" id="valTerminalServes">0</div>
        <div class="actions">
          <button class="ours" data-stat="usAces">Our Ace</button>
          <button class="theirs" data-stat="opponentAces">Their Ace</button>
          <button class="ours-neg" data-stat="usMisses">Our Miss</button>
          <button class="theirs-pos" data-stat="opponentMisses">Their Miss</button>
        </div>
      </article>

      <div class="triangle-row">
        <article class="vertex bottom-left">
          <h2>First Ball Points</h2>
          <div class="value" id="valFirstBallPoints">0</div>
          <div class="actions">
            <button class="ours" data-stat="firstBallUsKills">Our Kill</button>
            <button class="theirs" data-stat="firstBallOpponentKills">Their Kill</button>
            <button class="ours" data-stat="firstBallUsStops">Our Stop</button>
            <button class="theirs" data-stat="firstBallOpponentStops">Their Stop</button>
          </div>
        </article>

        <div class="triangle-center">
          <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <polygon points="50,5 5,95 95,95" fill="#f5a623" stroke="#1b1b28" stroke-width="2" vector-effect="non-scaling-stroke"/>
          </svg>
        </div>

        <article class="vertex bottom-right">
          <h2>Transition Points</h2>
          <div class="value" id="valTransitionPoints">0</div>
          <div class="actions">
            <button class="ours" data-stat="transitionUsKills">Our Kill</button>
            <button class="theirs" data-stat="transitionOpponentKills">Their Kill</button>
            <button class="ours" data-stat="transitionUsStops">Our Stop</button>
            <button class="theirs" data-stat="transitionOpponentStops">Their Stop</button>
          </div>
        </article>
      </div>

      <div class="bottom-bar">
        <div class="snapshot">
          <h3>Match Snapshot</h3>
          <table id="snapshotTable" class="snapshot-table">
            <thead>
              <tr>
                <th>Set</th>
                <th>Score</th>
                <th>TS</th>
                <th>FBP</th>
                <th>TP</th>
              </tr>
            </thead>
            <tbody id="snapshotBody"></tbody>
            <tfoot id="snapshotFoot"></tfoot>
          </table>
        </div>
      </div>
    </div>

    </div><!-- end statsPage -->

    <!-- ===== History Page ===== -->
    <div id="historyPage" class="history-page">
      <div class="history-list-panel">
        <h2>Match History</h2>
        <div id="historyList" class="history-list">
          <p>No saved matches yet.</p>
        </div>
      </div>
      <div class="history-preview-panel">
        <h2>Match Snapshot</h2>
        <p id="historyPreviewInfo" class="preview-info">Select a match to view details.</p>
        <table id="historySnapshotTable" class="snapshot-table" hidden>
          <thead>
            <tr>
              <th>Set</th>
              <th>Score</th>
              <th>TS</th>
              <th>FBP</th>
              <th>TP</th>
            </tr>
          </thead>
          <tbody id="historySnapshotBody"></tbody>
          <tfoot id="historySnapshotFoot"></tfoot>
        </table>
        <div id="historyActions" class="history-actions" hidden>
          <button id="btnResumeMatch">Resume Match</button>
          <button id="btnExportJson">Export JSON</button>
          <button id="btnExportCsv">Export CSV</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
